# =========================
# KUBERNETES DEPLOYMENT
# =========================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vproapp
  labels:
    app: vproapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vproapp
  template:
    metadata:
      labels:
        app: vproapp
    spec:
      containers:
        - name: vproapp
          image: {{ .Values.app.image }}:{{ .Values.app.tag }}
          ports:
            - name: vproapp-port
              containerPort: 8080

          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10

          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 5

      initContainers:
        - name: init-mydb
          image: busybox:1.36
          command:
            - sh
            - -c
            - >
              until nslookup vprodb.$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace).svc.cluster.local;
              do echo waiting for mydb; sleep 2; done;

        - name: init-memcache
          image: busybox:1.36
          command:
            - sh
            - -c
            - >
              until nslookup vprocache01.$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace).svc.cluster.local;
              do echo waiting for memcache; sleep 2; done;

        - name: init-rabbitmq
          image: busybox:1.36
          command:
            - sh
            - -c
            - >
              until nslookup vprormq01.$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace).svc.cluster.local;
              do echo waiting for rmq; sleep 2; done;

---

# =========================
# GITHUB ACTIONS WORKFLOW
# =========================
name: Deploy to EKS

on:
  push:
    branches:
      - main

jobs:
  DeployToEKS:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
          --region ${{ secrets.AWS_REGION }} \
          --name ${{ secrets.EKS_CLUSTER_NAME }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v1

      - name: Deploy Helm Chart
        uses: bitovi/github-actions-deploy-eks-helm@v1.2.8
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
          cluster-name: ${{ secrets.EKS_CLUSTER_NAME }}
          chart-path: helm/vprofilecharts
          namespace: default
          name: vprofile-stack
          values: |
            app.image=${{ secrets.REGISTRY }}/${{ secrets.ECR_REPOSITORY }}
            app.tag=${{ github.run_number }}