apiVersion: v1
kind: Deployment
metadata:
  name: vproapp
  labels:
    app: vproapp
spec: 
  replicas: 1
  selector: 
   matchLabels:
    app: vproapp
  template: 
    metadata: 
     labels:
      app: vproapp
  spec:
   containers:
   - name: vproapp
     image: {{ .Values.app.image}}:{{ .Values.app.tag}}
     ports:
     - name: vproapp-port
       containerPort: 8080
   initContainers:
   - name: init-mydb
     image: busybox:latest
     command: ['sh', '-c', 'until nslookup vprodb.$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace).svc.cluster.local; do echo waiting for mydb; sleep 2; done;']
     name: init-memcache
     image: busybox:latest
     command: ['sh', '-c', 'until nslookup vprocache01.$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace).svc.cluster.local; do echo waiting for memcache; sleep 2; done;']
     name: init-rabbitmq
     image: busybox:latest
     command: ['sh', '-c', 'until nslookup vprormq01.$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace).svc.cluster.local; do echo waiting for rmq; sleep 2; done;']

DeploToEKS:
   - needs: BUILD_AND_PUBLISH
     runs-on: ubuntu-latest
      steps:
      - name: Checkout code
        uses: actions/checkout@v2
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Get Kube config File
        run: aws eks update-kubeconfig --region ${{ secrets.AWS_REGION }} --name ${{ secrets.EKS_CLUSTER_NAME }}

      - name: Print Kube config file
        run: cat ~/.kube/config

      - name: Login to ECR
        run: kubectl get secret docker-registry regcred --docker-server=${{ secrets.REGISTRY }} --docker-username=AWS --docker-password=$(aws ecr get-login-password)

     - name: Deplou to helm
       uses: bitovi/github-actions-deploy-eks-helm@v1.2.8
       with:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          EKS_CLUSTER_NAME: ${{ secrets.EKS_CLUSTER }}
          chart_path: helm/vprofilecharts
          namespace: default
          values: appimge=${ secret.REGISTRY }/${{ secrets.ECR_REPOSITORY }}:$app.tag=${{ github.run_number }}
          name: vprofile-stack