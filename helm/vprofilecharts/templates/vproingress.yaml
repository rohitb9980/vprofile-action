apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vpro-ingress 
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
  - host: kube8.devopswithrohit.online
    http:
      paths:
      - path: /                # Added the dash here
        pathType: Prefix       # Fixed capitalization (pathType)
        backend:
          service:
            name: vproapp-service
            port:
              number: 8080